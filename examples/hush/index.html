<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <script type="module" src="../../dist/wanix.min.js"></script>
</head>
<body style="height: 100vh; margin: 0;">
    
    <!-- a wanix system is an empty root task/namespace -->
    <wanix-system wasm="../../dist/wanix.debug.wasm" debug>
        <!-- bind the task, term, and web namespaces to the system -->
        <wanix-bind dst="task" src="#task"></wanix-bind>
        <wanix-bind dst="term" src="#term"></wanix-bind>
        <wanix-bind dst="web" src="#web"></wanix-bind>
        <wanix-bind dst="js" src="#js"></wanix-bind>
        <wanix-bind dst="crush" src="#web/opfs"></wanix-bind>
        <wanix-bind dst="tmp" src="#ramfs"></wanix-bind>

        <!-- fetch the rc.wasm file -->
        <wanix-bind type="file" dst="rc.wasm" src="./rc.wasm"></wanix-bind>
        <!-- run the rc.wasm file as a gojs task in the web directory -->

        <!-- fetch bubbletea wasm into the namespace -->
        <wanix-bind type="fetch" dst="counter" src="../bubbletea-counter/bubbletea.wasm" mode="0755"></wanix-bind>
        <wanix-bind type="fetch" dst="sh.wasm" src="./gosh.wasm" mode="0755"></wanix-bind>
        <wanix-bind type="fetch" dst="hush" src="./hush.wasm" mode="0755"></wanix-bind>

        <!-- run bubbletea as gojs task with TERM_WINCH pointing to term's winch file -->
        <wanix-task id="repl" cmd="hush" type="gojs" env="HOME=/crush PATH=/ CRUSH_CORE_UTILS=1 DO_NOT_TRACK=1 TERM_WINCH=winch" term start>
            <wanix-bind dst="winch" src="#task/self/term/winch"></wanix-bind>
	</wanix-task>

        <!-- render the terminal for the repl -->
        <wanix-term raw no-scrollbar path="#task/repl/term"></wanix-term>
    </wanix-system>

</body>
</html>
