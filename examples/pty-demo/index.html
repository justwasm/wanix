<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Wanix PTY Demo</title>
    <script type="module" src="../../dist/wanix.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
    <style>
        body { margin: 0; height: 100vh; background: #000; }
        wanix-system { display: block; height: 100%; }
        wanix-term { height: 100%; }
    </style>
</head>
<body>
    <wanix-system wasm="../../dist/wanix.debug.wasm" debug>
        <!-- Fetch WASM binaries into the VFS -->
        <wanix-bind type="fetch" dst="child.wasm" src="child.wasm"></wanix-bind>
        <wanix-bind type="fetch" dst="pty-demo.wasm" src="pty-demo.wasm"></wanix-bind>

        <!-- Run the PTY demo as a gojs task with terminal -->
        <wanix-task id="demo" type="gojs" cmd="pty-demo.wasm" start term></wanix-task>

        <!-- Render terminal connected to the task -->
        <wanix-term path="#task/demo/term"></wanix-term>
    </wanix-system>
</body>
</html>
