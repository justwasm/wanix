<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Wanix Go Build Demo</title>
    <script type="module" src="../../dist/wanix.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; }
        .header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #0f3460; }
        .header h1 { margin: 0; font-size: 18px; color: #e94560; }
        .header p { margin: 4px 0 0; font-size: 13px; color: #888; }
        #terminal { height: calc(100vh - 80px); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Wanix Go Build Demo</h1>
        <p>Full pipeline: write source → compile → run, all in gojs workers</p>
    </div>

    <wanix-system wasm="../../dist/wanix.debug.wasm" debug>

        <wanix-task id="build" cmd="parent.wasm" type="gojs" term start>

            <!-- System namespace bindings -->
            <wanix-bind dst="task" src="#task"></wanix-bind>

            <!-- Go toolchain: binaries + stdlib + tools -->
            <wanix-bind type="archive" dst="go-toolchain" src="./go-toolchain.tar.gz"></wanix-bind>

            <!-- Writable workspace for source + compiled output -->
            <wanix-bind dst="." src="#ramfs"></wanix-bind>

            <!-- /dev/null: empty file, reads return EOF, writes discarded -->
            <wanix-bind type="file" dst="dev/null"></wanix-bind>

            <!-- The parent WASM binary -->
            <wanix-bind type="fetch" dst="parent.wasm" src="./parent.wasm"></wanix-bind>

        </wanix-task>

        <wanix-term path="#task/build/term"></wanix-term>
    </wanix-system>
</body>
</html>
